<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easter Egg - Snake</title>
    <link rel="stylesheet" href="Egg.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="game-container">
        <div class="header">
            <h1>SNAKE</h1>
            <div class="score-board">
                <div class="score-box">
                    <span class="label">SCORE</span>
                    <span id="score" class="value">0</span>
                </div>
                <div class="score-box">
                    <span class="label">HIGH SCORE</span>
                    <span id="high-score" class="value">0</span>
                </div>
            </div>
        </div>

        <div class="canvas-wrapper">
            <canvas id="gameCanvas"></canvas>

            <div id="overlay" class="overlay active">
                <h2 id="overlay-title">TAP TO START</h2>
                <p id="overlay-subtitle">Or press space</p>
                <div class="controls-hint">
                    Desktop: <span class="key">W</span><span class="key">A</span><span class="key">S</span><span
                        class="key">D</span> • Mobile: Use D-pad
                </div>
            </div>
        </div>
        <!-- Mobile Controls (hidden on desktop) -->
        <div class="mobile-controls">
            <button class="dpad-btn up" id="btn-up">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path>
                </svg>
            </button>
            <div class="dpad-row">
                <button class="dpad-btn left" id="btn-left">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7">
                        </path>
                    </svg>
                </button>
                <button class="dpad-btn down" id="btn-down">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                    </svg>
                </button>
                <button class="dpad-btn right" id="btn-right">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                </button>
            </div>
        </div>
    </div>
    <script src="Egg.js"></script>
</body>

</html>
